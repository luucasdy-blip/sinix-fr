<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c5cfc"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="40" height="40" rx="10" fill="url(#g1)"/>
  <!-- Glow effect -->
  <rect width="40" height="40" rx="10" fill="white" opacity="0.06"/>
  <!-- S letter -->
  <text x="50%" y="54%" text-anchor="middle" dominant-baseline="middle"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="22" font-weight="900" fill="url(#g2)" letter-spacing="-1">S</text>
</svg>
